<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaachila Moto - Admin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%236C5CE7'/><text x='50' y='65' text-anchor='middle' font-size='45'>🛺</text></svg>">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        :root{--bg:#0a0a0f;--bg2:#13111a;--card:#1a1722;--acc:#6C5CE7;--green:#00C897;--red:#FF4757;--warn:#FFA502;--txt:#fff;--txt2:#aaa;--txt3:#666;--bd:#252130;--r:14px;--r2:22px}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
        .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
        .login-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:2rem;width:90%;max-width:360px;text-align:center}
        .login-box .logo{font-size:3rem}.login-box h1{font-size:1.3rem;margin:.8rem 0}
        .inp{width:100%;padding:.7rem;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);color:var(--txt);margin-bottom:.6rem;outline:0;font-size:.9rem}
        .inp:focus{border-color:var(--acc)}
        .btn{width:100%;padding:.7rem;border-radius:var(--r);font-weight:700;cursor:pointer;border:0;font-size:.85rem}.btn-acc{background:var(--acc);color:#fff}
        .login-err{background:rgba(255,71,87,.1);border:1px solid var(--red);padding:.5rem;border-radius:var(--r);margin-bottom:.6rem;font-size:.75rem;display:none}
        .dashboard{display:none}.topbar{background:var(--bg2);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
        .topbar h2{font-size:1rem}.topbar-actions{display:flex;gap:.4rem;align-items:center}
        .layout{display:grid;grid-template-columns:200px 1fr;gap:1rem;padding:1rem}
        .sidebar{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:.8rem;height:fit-content;position:sticky;top:60px}
        .sidebar a{display:flex;align-items:center;gap:.5rem;padding:.6rem .8rem;border-radius:var(--r);color:var(--txt2);text-decoration:none;font-size:.8rem;margin-bottom:.2rem;cursor:pointer}.sidebar a:hover,.sidebar a.on{background:var(--acc);color:#fff}
        .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.7rem;margin-bottom:1rem}
        .card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:1rem}.card .val{font-size:1.8rem;font-weight:800}.card .lbl{font-size:.7rem;color:var(--txt3)}
        .panel{background:var(--card);border:1px solid var(--bd);border-radius:var(--r2);padding:1rem}.panel h3{font-size:.9rem;margin-bottom:.8rem}
        table{width:100%;border-collapse:collapse;font-size:.7rem}th{background:rgba(255,255,255,.03);padding:.4rem;text-align:left;font-weight:600;color:var(--txt2);font-size:.6rem;text-transform:uppercase}td{padding:.4rem;border-bottom:1px solid rgba(255,255,255,.03)}
        .badge{padding:.15rem .5rem;border-radius:10px;font-size:.6rem;font-weight:700}.badge-g{background:rgba(0,200,151,.15);color:var(--green)}.badge-r{background:rgba(255,71,87,.15);color:var(--red)}.badge-y{background:rgba(255,165,2,.15);color:var(--warn)}
        .toast{position:fixed;top:15px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--bd);padding:.6rem 1rem;border-radius:var(--r);z-index:300;font-size:.75rem;font-weight:600;animation:t 2.5s ease forwards;pointer-events:none}
        @keyframes t{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
    </style>
</head>
<body>
<div id="loginScreen" class="login-screen"><div class="login-box"><div class="logo">🛺</div><h1>Zaachila Moto Admin</h1><div id="loginError" class="login-err"></div><input type="email" id="email" class="inp" placeholder="Email"><input type="password" id="password" class="inp" placeholder="Contraseña"><button class="btn btn-acc" onclick="login()">Ingresar</button></div></div>
<div id="dashboard" class="dashboard">
    <header class="topbar"><h2>🛺 Zaachila Moto</h2><div class="topbar-actions"><span id="adminName" style="font-size:.75rem;color:var(--txt2)">Admin</span><button class="btn btn-sm" onclick="auth.signOut();location.reload()" style="background:var(--card);border:1px solid var(--bd);color:var(--txt2);padding:.3rem .6rem;border-radius:8px;font-size:.7rem;cursor:pointer">Salir</button></div></header>
    <div class="layout">
        <nav class="sidebar">
            <a class="on" onclick="tab('overview',this)">📊 Panel</a>
            <a onclick="tab('drivers',this)">🛺 Choferes</a>
            <a onclick="tab('solicitudes',this)">📝 Solicitudes</a>
        </nav>
        <div>
            <div id="tab-overview"><div class="cards"><div class="card"><div class="val" id="stActive">-</div><div class="lbl">Choferes activos</div></div><div class="card"><div class="val" id="stServices">-</div><div class="lbl">Viajes en curso</div></div></div></div>
            <div id="tab-drivers" style="display:none"><div class="panel"><h3>🛺 Choferes <button class="btn btn-sm" onclick="addDriver()" style="margin-left:auto;background:var(--acc);color:#fff;border:0;padding:.3rem .6rem;border-radius:8px;font-size:.7rem;cursor:pointer">+ Nuevo</button></h3><table><thead><tr><th>Nombre</th><th>Email</th><th>Estado</th></tr></thead><tbody id="driversBody"><tr><td colspan="3">Cargando...</td></tr></tbody></table></div></div>
            <div id="tab-solicitudes" style="display:none"><div class="panel"><h3>📝 Solicitudes</h3><table><thead><tr><th>Nombre</th><th>Email</th><th>Estado</th><th></th></tr></thead><tbody id="solicitudesBody"><tr><td colspan="4">Cargando...</td></tr></tbody></table></div></div>
        </div>
    </div>
</div>

<script>
const fb={apiKey:"AIzaSyCBXBPMz2OZ3U2KfTaU-uHCBhwmbnR7O40",authDomain:"zaachilamoto.firebaseapp.com",databaseURL:"https://zaachilamoto-default-rtdb.firebaseio.com",projectId:"zaachilamoto",storageBucket:"zaachilamoto.firebasestorage.app",messagingSenderId:"559788509526",appId:"1:559788509526:web:c751d8d22068f09041aef7"};
firebase.initializeApp(fb);
const auth=firebase.auth();
const db=firebase.database();
console.log('✅ Firebase listo');

function login(){
    const e=document.getElementById('email').value.trim();
    const p=document.getElementById('password').value;
    const err=document.getElementById('loginError');
    
    if(!e||!p){err.textContent='Completa los campos';err.style.display='block';return}
    err.style.display='none';
    
    auth.signInWithEmailAndPassword(e,p).then(userCredential=>{
        const user=userCredential.user;
        console.log('✅ Login:',user.email);
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('dashboard').style.display='block';
        document.getElementById('adminName').textContent=user.email.split('@')[0];
        loadAll();
    }).catch(er=>{
        console.error('❌',er.message);
        err.textContent='Error: '+er.message;
        err.style.display='block';
    });
}

auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('dashboard').style.display='block';
        document.getElementById('adminName').textContent=(user.email||'Admin').split('@')[0];
        loadAll();
    }
});

function loadAll(){loadStats();loadDrivers();loadSolicitudes();}
function loadStats(){db.ref('choferes').orderByChild('estado').equalTo('activo').on('value',s=>document.getElementById('stActive').textContent=s.numChildren());db.ref('servicios').orderByChild('estado').equalTo('en_servicio').on('value',s=>document.getElementById('stServices').textContent=s.numChildren());}
function loadDrivers(){db.ref('choferes').once('value',s=>{const d=s.val();let h='';if(!d){document.getElementById('driversBody').innerHTML='<tr><td colspan="3">Sin choferes</td></tr>';return}Object.entries(d).forEach(([id,c])=>{const b=c.estado==='activo'?'badge-g':'badge-y';h+=`<tr><td>${c.nombre||'-'}</td><td>${c.email||'-'}</td><td><span class="badge ${b}">${c.estado||'-'}</span></td></tr>`});document.getElementById('driversBody').innerHTML=h})}
function loadSolicitudes(){db.ref('solicitudes_choferes').limitToLast(10).once('value',s=>{const d=s.val();let h='';if(!d){document.getElementById('solicitudesBody').innerHTML='<tr><td colspan="4">Sin solicitudes</td></tr>';return}Object.entries(d).reverse().forEach(([id,sol])=>{let bc='badge-y',txt='pendiente';if(sol.estado==='autorizado'){bc='badge-g';txt='autorizado'}if(sol.estado==='declinado'){bc='badge-r';txt='declinado'}h+=`<tr><td>${sol.nombre||'-'}</td><td>${sol.email||'-'}</td><td><span class="badge ${bc}">${txt}</span></td><td>${sol.estado==='pendiente'?`<button class="btn btn-sm" onclick="autorizarChofer('${id}')" style="background:var(--green);color:#000;border:0;padding:.2rem .5rem;border-radius:6px;font-size:.6rem;cursor:pointer">✅</button>`:''}</td></tr>`});document.getElementById('solicitudesBody').innerHTML=h})}
function autorizarChofer(id){db.ref(`solicitudes_choferes/${id}`).once('value',snap=>{const sol=snap.val();const password=Math.random().toString(36).slice(-8);auth.createUserWithEmailAndPassword(sol.email,password).then(u=>db.ref(`choferes/${u.user.uid}`).set({nombre:sol.nombre,email:sol.email,telefono:sol.telefono,sitio:sol.sitio,placa:sol.placa,numero:sol.numero,color:sol.color,estado:'activo',calificacion:0,total_servicios:0,password:password})).then(()=>{db.ref(`solicitudes_choferes/${id}`).update({estado:'autorizado',password:password});toast('✅ Autorizado. Pass: '+password);loadSolicitudes();loadDrivers();loadStats()}).catch(er=>toast('Error: '+er.message))})}
function addDriver(){const n=prompt('Nombre:');if(!n)return;const e=prompt('Email:');if(!e)return;const p=prompt('Contraseña (mín 6):');if(!p||p.length<6){toast('Contraseña mínimo 6');return}auth.createUserWithEmailAndPassword(e,p).then(u=>db.ref(`choferes/${u.user.uid}`).set({nombre:n,email:e,estado:'activo',password:p})).then(()=>{toast('✅ Creado');loadDrivers()}).catch(er=>toast(er.message))}
function tab(name,el){document.querySelectorAll('[id^="tab-"]').forEach(t=>t.style.display='none');document.getElementById('tab-'+name).style.display='block';document.querySelectorAll('.sidebar a').forEach(a=>a.classList.remove('on'));el.classList.add('on');if(name==='drivers')loadDrivers();if(name==='solicitudes')loadSolicitudes();}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}
</script>
</body>
</html>
